<ion-content [fullscreen]="true">
  <main class="register-page">
    <section class="register-hero">
      <fl-logo size="small" [showText]="true"></fl-logo>

      <h1>Konto erstellen</h1>

      <p>Erstelle dein Konto und beginne mit deinem persönlichen Lernplan.</p>
    </section>

    <section class="register-panel">
      <form
        class="register-form"
        [formGroup]="registerForm"
        (ngSubmit)="submitRegistration()"
        novalidate
      >
        <fl-input
          label="Name"
          type="text"
          icon="person-outline"
          placeholder="Dein Name"
          autocomplete="name"
          [value]="registerForm.controls.name.value"
          [invalid]="nameInvalid"
          errorMessage="Bitte gib mindestens zwei Zeichen ein."
          (valueChange)="registerForm.controls.name.setValue($event)"
        ></fl-input>

        <fl-input
          label="E-Mail-Adresse"
          type="email"
          icon="mail-outline"
          placeholder="name@beispiel.de"
          autocomplete="email"
          [value]="registerForm.controls.email.value"
          [invalid]="emailInvalid"
          errorMessage="Bitte gib eine gültige E-Mail-Adresse ein."
          (valueChange)="registerForm.controls.email.setValue($event)"
        ></fl-input>

        <fl-input
          label="Passwort"
          type="password"
          icon="lock-closed-outline"
          placeholder="Mindestens 8 Zeichen"
          autocomplete="new-password"
          [value]="registerForm.controls.password.value"
          [invalid]="passwordInvalid"
          errorMessage="Das Passwort muss mindestens 8 Zeichen enthalten."
          (valueChange)="registerForm.controls.password.setValue($event)"
        ></fl-input>

        <fl-input
          label="Passwort bestätigen"
          type="password"
          icon="lock-closed-outline"
          placeholder="Passwort wiederholen"
          autocomplete="new-password"
          [value]="registerForm.controls.confirmPassword.value"
          [invalid]="confirmPasswordInvalid"
          errorMessage="Die Passwörter stimmen nicht überein."
          (valueChange)="
            registerForm.controls.confirmPassword.setValue($event)
          "
        ></fl-input>

        <p class="terms">
          Mit der Registrierung akzeptierst du unsere
          <a href="#">Nutzungsbedingungen</a>
          und
          <a href="#">Datenschutzerklärung</a>.
        </p>

        @if (registerError) {
        <p class="register-error" role="alert">{{ registerError }}</p>
        }

        <div class="register-button-wrapper">
          <fl-button
            text="Konto erstellen"
            [loading]="isSubmitting"
            [disabled]="isSubmitting"
            (clicked)="submitRegistration()"
          ></fl-button>
        </div>

        <div class="divider" aria-hidden="true">
          <span></span>
          <p>oder</p>
          <span></span>
        </div>

        <fl-social-button
          provider="google"
          text="Mit Google registrieren"
          (clicked)="registerWithGoogle()"
        ></fl-social-button>

        <p class="login-link">
          Du hast bereits ein Konto?

          <a routerLink="/login"> Anmelden </a>
        </p>
      </form>
    </section>
  </main>
</ion-content>
