<ion-content [fullscreen]="true">
  <main class="editor-page">
    <header class="editor-header">
      <button
        class="header-button"
        type="button"
        aria-label="Zurück zu den Lernsets"
        (click)="goBack()"
      >
        <ion-icon name="arrow-back-outline"></ion-icon>
      </button>

      <div class="header-title">
        <h1>{{ setTitle }}</h1>
        <p>{{ cards.length }} cards</p>
      </div>

      <button class="header-button" type="button" aria-label="Weitere Optionen">
        <ion-icon name="ellipsis-vertical-outline"></ion-icon>
      </button>
    </header>

    <section class="editor-content">
      <div class="cards-list">
        @for ( card of cards; track card.id; let index = $index ) {
        <article
          class="flashcard-editor"
          [id]="'card-' + card.id"
          [class.editing]="editingCardId === card.id"
        >
          <header class="card-header">
            <span>Card {{ index + 1 }}</span>

            <button
              class="delete-button"
              type="button"
              aria-label="Lernkarte löschen"
              (click)="deleteCard(card.id)"
            >
              <ion-icon name="trash-outline"></ion-icon>
            </button>
          </header>

          @if (editingCardId === card.id) {
          <div class="card-fields">
            <label>
              <span>Front</span>

              <textarea
                [(ngModel)]="card.front"
                placeholder="Enter term or question..."
                rows="3"
              ></textarea>
            </label>

            <label>
              <span>Back</span>

              <textarea
                [(ngModel)]="card.back"
                placeholder="Enter definition or answer..."
                rows="3"
              ></textarea>
            </label>

            <button
              class="done-button"
              type="button"
              (click)="toggleEdit(card.id)"
            >
              Done
            </button>
          </div>
          } @else {
          <button
            class="card-preview"
            type="button"
            (click)="toggleEdit(card.id)"
          >
            <div>
              <span>Front</span>
              <strong> {{ card.front || 'Tap to enter front' }} </strong>
            </div>

            <div>
              <span>Back</span>
              <strong> {{ card.back || 'Tap to enter back' }} </strong>
            </div>
          </button>
          }
        </article>
        }
      </div>

      <button class="add-card" type="button" (click)="addCard()">
        <span class="add-card-icon">
          <ion-icon name="add-outline"></ion-icon>
        </span>

        <strong>Add New Card</strong>
        <small>Tap to add a term &amp; definition</small>
      </button>

      <button
        class="start-button"
        type="button"
        [disabled]="!cardsComplete"
        (click)="startStudying()"
      >
        Start Studying
        <span aria-hidden="true">→</span>
      </button>

      @if (!cardsComplete) {
      <p class="form-hint">
        Bitte fülle bei jeder Lernkarte Vorder- und Rückseite aus.
      </p>
      }
    </section>
  </main>
</ion-content>
