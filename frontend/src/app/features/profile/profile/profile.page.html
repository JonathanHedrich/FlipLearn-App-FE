<ion-content [fullscreen]="true">
  <main class="profile-page">
    <header class="profile-header">
      <div class="header-top">
        <h1>Profile</h1>

        <div class="header-actions">
          <button
            class="header-button"
            type="button"
            aria-label="Benachrichtigungen öffnen"
            (click)="openNotifications()"
          >
            <ion-icon name="notifications-outline"></ion-icon>
            <span class="notification-badge">2</span>
          </button>

          <button
            class="header-button"
            type="button"
            aria-label="Einstellungen öffnen"
            (click)="openSettings()"
          >
            <ion-icon name="settings-outline"></ion-icon>
          </button>
        </div>
      </div>

      <section class="profile-identity">
        <div class="avatar">{{ user.initials }}</div>

        <h2>{{ user.name }}</h2>
        <p>{{ user.email }}</p>

        <div class="member-badge">
          <ion-icon name="star-outline"></ion-icon>
          Member since {{ user.memberSince }}
        </div>
      </section>
    </header>

    <section class="profile-content">
      <section class="stats-grid">
        <article class="stat-card">
          <strong>{{ stats.sets }}</strong>
          <span>Sets</span>
        </article>

        <article class="stat-card">
          <strong>{{ stats.cards }}</strong>
          <span>Cards</span>
        </article>

        <article class="stat-card">
          <strong>{{ stats.streak }}d</strong>
          <span>Streak</span>
        </article>

        <article class="stat-card">
          <strong>{{ stats.accuracy }}%</strong>
          <span>Accuracy</span>
        </article>
      </section>

      <section class="my-sets-section">
        <h2>My Sets</h2>

        <div class="sets-list">
          @for (set of sets; track set.id) {
          <button
            class="profile-set-card"
            type="button"
            (click)="openSet(set.id)"
          >
            <div
              class="set-icon"
              [class.theme-blue]="set.theme === 'blue'"
              [class.theme-purple]="set.theme === 'purple'"
              [class.theme-green]="set.theme === 'green'"
              [class.theme-orange]="set.theme === 'orange'"
            >
              <ion-icon name="book-outline"></ion-icon>
            </div>

            <div class="set-information">
              <h3>{{ set.title }}</h3>

              <p>{{ set.cards }} cards · {{ set.progress }}% complete</p>
            </div>

            <ion-icon
              class="set-chevron"
              name="chevron-forward-outline"
            ></ion-icon>
          </button>
          }
        </div>
      </section>
    </section>
  </main>
</ion-content>

<fl-bottom-nav activePage="profile"></fl-bottom-nav>
