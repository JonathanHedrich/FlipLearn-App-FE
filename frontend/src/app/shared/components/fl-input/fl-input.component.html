<div class="field">
  @if (label) {
    <label class="field-label">
      {{ label | translate }}
    </label>
  }

  <div class="input-wrapper" [class.input-invalid]="invalid">
    @if (icon) {
      <ion-icon class="input-icon" [name]="icon"></ion-icon>
    }

    <ion-input
      [type]="currentType"
      [value]="value"
      [placeholder]="placeholder | translate"
      [autocomplete]="autocomplete"
      (ionInput)="onInput($event)"
    ></ion-input>

    @if (type === "password") {
      <button
        type="button"
        class="password-toggle"
        (click)="togglePassword()"
        [attr.aria-label]="
          passwordVisible
            ? ('common.hidePassword' | translate)
            : ('common.showPassword' | translate)
        "
      >
        <ion-icon
          [name]="passwordVisible ? 'eye-off-outline' : 'eye-outline'"
        ></ion-icon>
      </button>
    }
  </div>

  @if (invalid && errorMessage) {
    <p class="error-message">
      {{ errorMessage | translate }}
    </p>
  }
</div>
