<button
  class="social-button"
  type="button"
  [class.social-button-google]="provider === 'google'"
  [class.social-button-apple]="provider === 'apple'"
  [class.social-button-microsoft]="provider === 'microsoft'"
  [disabled]="disabled || loading"
  (click)="onClick()"
>
  @if (loading) {
    <ion-spinner name="crescent"></ion-spinner>
  } @else {
    <ion-icon
      class="social-icon"
      [name]="iconName"
      aria-hidden="true"
    ></ion-icon>

    <span>{{ buttonText }}</span>
  }
</button>
